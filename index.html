<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varun's Weather Checker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("https://img.magnific.com/free-photo/seoraksan-mountains-is-covered-by-morning-fog-sunrise-seoul-korea_335224-313.jpg?semt=ais_hybrid&w=740&q=80");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
width:350px;
padding:25px;
border-radius:20px;
text-align:center;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(12px);

box-shadow:0px 5px 20px rgba(0,0,0,0.4);

border:1px solid rgba(255,255,255,0.3);
}

h1{
margin-bottom:20px;
color:white;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
margin-bottom:15px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:scale(1.05);
transition:0.3s;
}

.weather{
margin-top:20px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.2);
color:white;
}

.weather p{
margin:10px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>Varun's Weather Checker</h1>

<input type="text" id="city" placeholder="Enter city name">

<button onclick="getWeather()">Search</button>

<div class="weather">

<h2 id="cityName"></h2>

<p id="temp"></p>

<p id="condition"></p>

<p id="humidity"></p>

<p id="wind"></p>

</div>

</div>

<script src="weather.js"></script>

</body>
</html>
